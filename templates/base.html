<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Finance{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/htmx.org@2.0.4"></script>
  <style>
    [htmx-indicator] { opacity: 0; transition: opacity 200ms ease-in; }
    .htmx-request [htmx-indicator] { opacity: 1; }
  </style>
</head>
<body class="bg-white text-gray-900 antialiased min-h-screen">
  <nav class="border-b border-gray-200">
    <div class="max-w-7xl mx-auto px-4 flex items-center gap-6 h-14">
      <span class="font-semibold text-lg">Finance</span>
      <a href="{% url 'transactions' %}"
         class="text-sm {% if request.resolver_match.url_name == 'transactions' %}text-gray-900 font-medium{% else %}text-gray-500 hover:text-gray-700{% endif %}">
        Transactions
      </a>
      <a href="{% url 'categories' %}"
         class="text-sm {% if request.resolver_match.url_name == 'categories' %}text-gray-900 font-medium{% else %}text-gray-500 hover:text-gray-700{% endif %}">
        Categories
      </a>
    </div>
  </nav>

  <main class="max-w-7xl mx-auto px-4 py-6">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
